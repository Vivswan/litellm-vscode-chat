name: Format Check (Reusable)

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: false
        type: string
        default: ''

jobs:
  format-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Set up development environment
        run: bash scripts/setup-env.sh

      - name: Check formatting
        run: bunx prettier --check .

      - name: Verify @types/vscode matches engines.vscode
        run: |
          node -e "
          const pkg = require('./package.json');
          const expected = '^' + pkg.engines.vscode.replace(/^[~^<>=\s]+/, '');
          const actual = pkg.devDependencies['@types/vscode'];
          if (actual !== expected) {
            console.error('@types/vscode must be ' + expected + ' to match engines.vscode, got ' + actual);
            process.exit(1);
          }
          console.log('@types/vscode matches engines.vscode: ' + actual);
          "
