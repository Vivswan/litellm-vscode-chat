name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - bun.lock
      - tsconfig.json
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - bun.lock
      - tsconfig.json

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 59
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile TypeScript
        run: bun run compile

      - name: Lint source
        run: bun run lint
