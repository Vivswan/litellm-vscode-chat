name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .devcontainer/devcontainer.json
      - package.json
      - bun.lock
      - scripts/setup-env.sh
      - tsconfig.json
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .devcontainer/devcontainer.json
      - package.json
      - bun.lock
      - scripts/setup-env.sh
      - tsconfig.json

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 59
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Set up development environment
        run: bash scripts/setup-env.sh --verify
