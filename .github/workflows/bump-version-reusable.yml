name: Bump Version (Reusable)

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install

      # Use bump-version script to calculate next patch version
      - name: Calculate next version
        id: next_version
        run: |
          BUMPING_VERSION=$(bun run bump-version)
          NEXT_VERSION="${BUMPING_VERSION##*-> }"
          CURRENT_VERSION="${BUMPING_VERSION%% ->*}"
          {
            echo "bumping_version=$BUMPING_VERSION"
            echo "next_version=$NEXT_VERSION"
            echo "current_version=$CURRENT_VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "$BUMPING_VERSION"

      # Create a new branch for the version bump
      - name: Create version bump branch
        run: |
          git push origin --delete version-bump-${{ steps.next_version.outputs.next_version }} 2>/dev/null || true
          git checkout -b version-bump-${{ steps.next_version.outputs.next_version }}

      # Configure Git
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      # Commit version update
      - name: Commit version update
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.next_version.outputs.next_version }}"
          git push origin version-bump-${{ steps.next_version.outputs.next_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0

      - name: Check package.json
        run: |
          cat package.json

      # Create pull request
      - name: Create Pull Request
        run: |
          gh pr create \
            --base main \
            --head version-bump-${{ steps.next_version.outputs.next_version }} \
            --title "Version Bump to ${{ steps.next_version.outputs.next_version }}" \
            --body "## Version Bump
          This PR automatically bumps the version from ${{ steps.next_version.outputs.current_version }} to ${{ steps.next_version.outputs.next_version }} after a successful release.

          This PR was automatically created by the release workflow." \
            --label "version-bump" \
            --label "automated-pr"
          gh pr merge --auto --squash \
            version-bump-${{ steps.next_version.outputs.next_version }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
