name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Lint GitHub Actions workflows
        uses: devops-actions/actionlint@9fb9c192862f19e684586ca84b500461bcd8a541 # v0.1.12

  test:
    uses: ./.github/workflows/test-reusable.yml
    with:
      os: 'matrix'

  format-check:
    uses: ./.github/workflows/format-check-reusable.yml

  # Single aggregate gate: this is the ONLY CI context branch protection requires,
  # so adding/renaming matrix jobs never desyncs .github/settings.yml.
  all-green:
    name: all-green
    if: always()
    needs: [ actionlint, test, format-check ]
    runs-on: ubuntu-latest
    steps:
      - name: Require all CI jobs to have succeeded
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "needs results: $results"
          case ",$results," in
            *,failure,* | *,cancelled,* | *,skipped,*)
              echo "::error::a required CI job did not succeed ($results)"; exit 1 ;;
          esac
          echo "all required CI jobs succeeded"
